<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="Hanyuban Academy" content="width=device-width, initial-scale=1.0"/>
  <title>AI Literacy Checker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Prompt", sans-serif;
    }

    body{
      background: linear-gradient(135deg,#ffecd2,#fcb69f);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
    }

    .container{
      width:100%;
      max-width:800px;
      background:white;
      border-radius:24px;
      padding:40px;
      box-shadow:0 15px 40px rgba(0,0,0,0.15);
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      color:#ff5722;
      font-size:2.2rem;
    }

    .subtitle{
      text-align:center;
      color:#666;
      margin-bottom:30px;
    }

    .question{
      background:#fff7f3;
      padding:18px;
      border-radius:18px;
      margin-bottom:15px;
      transition:0.3s;
      border:2px solid transparent;
    }

    .question:hover{
      border-color:#ff5722;
      transform:translateY(-2px);
    }

    label{
      display:flex;
      gap:15px;
      align-items:flex-start;
      cursor:pointer;
      font-size:1rem;
      line-height:1.6;
    }

    input[type="checkbox"]{
      width:22px;
      height:22px;
      accent-color:#ff5722;
      margin-top:3px;
    }

    .result-box{
      margin-top:35px;
      background:#fff3e0;
      border-radius:20px;
      padding:30px;
      text-align:center;
    }

    .score{
      font-size:4rem;
      font-weight:bold;
      color:#ff5722;
    }

    .level{
      font-size:1.5rem;
      font-weight:bold;
      margin-top:10px;
      color:#333;
    }

    .description{
      margin-top:10px;
      color:#666;
    }

    .badge{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      border-radius:999px;
      background:#ff5722;
      color:white;
      font-weight:bold;
      font-size:1rem;
    }

    footer{
      margin-top:25px;
      text-align:center;
      color:#999;
      font-size:0.9rem;
    }

    @media(max-width:768px){
      .container{
        padding:25px;
      }

      h1{
        font-size:1.8rem;
      }

      .score{
        font-size:3rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>AI Literacy Checker</h1>
    <p class="subtitle">
      เลือกสิ่งที่คุณสามารถทำได้เกี่ยวกับ AI
    </p>

    <div id="questions"></div>

    <div class="result-box">
      <div class="score" id="score">0</div>
      <div class="level" id="level">Aware</div>
      <div class="description" id="description">
        คุณเริ่มต้นเข้าใจ AI แล้ว
      </div>

      <div class="badge" id="badge">
        Level: Aware
      </div>
    </div>

    <footer>
      AI Literacy Assessment • GitHub Pages Ready
    </footer>

  </div>

  <script>

    const questions = [
      "ฉันอธิบายได้ว่า ChatGPT ทำงานอย่างไร",
      "ฉันเคยใช้ AI ในงานอย่างน้อยสัปดาห์ละ 3 ครั้ง",
      "ฉันรู้ว่า AI hallucination คืออะไร",
      "ฉันเคยตรวจสอบข้อมูลจาก AI ก่อนนำไปใช้",
      "ฉันรู้ว่า PDPA ของไทยห้ามทำอะไรบ้าง",
      "ฉันสามารถระบุความเสี่ยงของ AI ได้",
      "ฉันรู้จัก EU AI Act",
      "ฉันเคยปฏิเสธคำตอบของ AI ที่ดูไม่ถูกต้องหรือ deepfake"
    ];

    const questionsContainer = document.getElementById("questions");

    questions.forEach((q, index) => {
      questionsContainer.innerHTML += `
        <div class="question">
          <label>
            <input type="checkbox" onchange="calculateScore()">
            <span>${index + 1}. ${q}</span>
          </label>
        </div>
      `;
    });

    function calculateScore() {

      const checked = document.querySelectorAll("input[type='checkbox']:checked").length;

      document.getElementById("score").innerText = checked;

      let level = "";
      let desc = "";

      if (checked <= 2) {
        level = "Aware";
        desc = "คุณเริ่มต้นเข้าใจ AI และควรเรียนรู้เพิ่มเติม";
      }

      else if (checked <= 5) {
        level = "User";
        desc = "คุณใช้งาน AI ได้ดีและเริ่มเข้าใจความเสี่ยง";
      }

      else {
        level = "Advanced User → Builder";
        desc = "คุณมีความเข้าใจ AI ในระดับสูง พร้อมต่อยอดสร้างนวัตกรรม";
      }

      document.getElementById("level").innerText = level;
      document.getElementById("description").innerText = desc;
      document.getElementById("badge").innerText = "Level: " + level;
    }

  </script>

</body>
</html>
